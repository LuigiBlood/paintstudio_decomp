name: Mario Artist Paint Studio
basename: dmpj
sha1: c3cd83e8aa479ba8b5e039ff99abfa630b5d1fa7
options:
  compiler: IDO
  symbol_addrs_path: tools/symbol_addrs.txt
  target_path: dmpj.d64
  basename: dmpj
  base_path: .
  ld_script_path: dmpj.ld
  ld_fill_value: 0xFFFFFFFF
  platform: n64 # not n64. n64dd
  hasm_in_src_path: True
  ld_legacy_generation: true
  detect_redundant_function_end: true
  gfx_ucode: f3dex # not F3DEX but whatever
  subalign: 8
  ld_align_segment_start: 8
  ld_align_segment_vram_end: false
  ld_align_section_vram_end: false
segments:
  - name: header
    type: data # this is not a typical N64 header. Do not let splat process it as such.
    start: 0x00
    vram: 0
    subsegments:
    - [0x0000, data, header]
  - name: boot
    type: code
    start: 0x0200 # LBA 0
    vram: 0x80000400
    align: 8
    subsegments:
    - [0x0200, asm, entrypoint]
    - [0x0250, data]
    - [0x0260, asm]
    - [0x34A20, data]

    # DATA - Microcode
    - { start: 0x76380, type: databin, use_src_path: True, name: rsp/f3dex2 }
    - { start: 0x767A0, type: databin, use_src_path: True, name: rsp/s2dex2 }
    - { start: 0x76B90, type: databin, use_src_path: True, name: rsp/f3dpex2 }

    - [0x76FB0, pad]
  - name: main
    type: code
    dir: main
    start: 0x787C8
    vram: 0x800BD8E0
    align: 8
    subsegments:
    - [0x787C8, asm]
    - [0xDA398, data]
    - [0x11A228, pad]
  - name: capture
    type: code
    dir: capture
    start: 0x11C2D8
    vram: 0x801F6EB0
    align: 8
    subsegments:
    - [0x11C2D8, asm]
    - [0x177F28, data]
    - [0x19CF98, pad]
  - name: printer
    exclusive_ram_id: overlay
    type: code
    dir: overlays/printer
    start: 0x19E2B0
    vram: 0x80284130
    align: 8
    symbol_name_format: print_$VRAM
    subsegments:
    - [0x19E2B0, asm]
    - [0x1C6068, data] #alignment problem here
    - [0x1F3200, pad]
  - name: saveload
    exclusive_ram_id: overlay
    type: code
    dir: overlays/saveload
    start: 0x1F4D40
    vram: 0x80284130
    align: 8
    symbol_name_format: saveload_$VRAM
    subsegments:
    - [0x1F4D40, asm]
    - [0x2346C0, data]
    - [0x23B610, databin] # gfx
    - [0x279C60, pad]
  - name: camera
    exclusive_ram_id: overlay
    type: code
    dir: overlays/camera
    start: 0x27BA20
    vram: 0x80284130
    align: 8
    symbol_name_format: cam_$VRAM
    subsegments:
    - [0x27BA20, asm]
    - [0x295C30, data]
    - [0x2BA0A0, pad]
  - name: 3dworld_gfx
    type: data
    start: 0x2BA388
    vram: 0x8033DB70
    align: 8
    subsegments:
    - [0x2BA388, databin] # gfx
    - [0x2E5C28, pad]
  - name: yay0_segment
