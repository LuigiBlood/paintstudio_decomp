name: Mario Artist Paint Studio
basename: dmpj
sha1: c3cd83e8aa479ba8b5e039ff99abfa630b5d1fa7
options:
  compiler: IDO
  symbol_addrs_path: tools/symbol_addrs.txt
  target_path: dmpj.d64
  basename: dmpj
  base_path: .
  ld_script_path: dmpj.ld
  ld_fill_value: 0xFFFFFFFF
  platform: n64 # not n64. n64dd
  hasm_in_src_path: True
  ld_legacy_generation: true
  detect_redundant_function_end: true
  gfx_ucode: f3dex # not F3DEX but whatever
  subalign: 8
  ld_align_segment_start: 8
  ld_align_segment_vram_end: false
  ld_align_section_vram_end: false
segments:
  - name: header
    type: data # this is not a typical N64 header. Do not let splat process it as such.
    start: 0x00
    vram: 0
    subsegments:
    - [0x0000, data, header]
  - name: boot
    type: code
    start: 0x0200 # LBA 0
    vram: 0x80000400
    align: 8
    subsegments:
    - [0x0200, asm, entrypoint] # maybe hasm
    - [0x0250, data] # list of LBA Start/End Mapping Info (unused here)

    - [0x0260, asm]
    - [0x1160, c, gameboot]
    - [0x76B0, asm]

    #--libleo .text
    - [0xC500, asm, leo/lib/readwrite]
    - [0xC590, asm, leo/lib/leofunc]
    - [0xCA00, asm, leo/lib/leoint]
