name: Ubuntu Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ROM_PASSWORD: ${{ secrets.PAINTSTUDIO_ROM_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check out private ROM repository
        uses: actions/checkout@v4
        with:
          repository: zestydevy/paintstudio-private
          token: ${{ secrets.PAINTSTUDIO_PRIVATE_REPO_TOKEN }}
          path: paintstudio-private
          sparse-checkout: |
            dmpj.d64.aes
          sparse-checkout-cone-mode: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-mips-linux-gnu \
            gcc \
            git \
            libc-dev \
            libc6-dev \
            ninja-build \
            python3 \
            python3-pip \
            curl \
            make \
            openssl

      - name: Install Python dependencies
        run: python3 -m pip install --break-system-packages -r tools/splat/requirements.txt

      - name: Decrypt baserom
        run: |
          test -n "$ROM_PASSWORD"
          openssl enc -d -aes-256-cbc -salt -pbkdf2 -iter 100000 \
            -in paintstudio-private/dmpj.d64.aes \
            -out dmpj.d64 \
            -pass env:ROM_PASSWORD

      - name: Set up project
        run: make setup

      - name: Build project
        run: make

      - name: Verify built ROM hash
        run: md5sum -c checksum.md5